name: build & release

# Compiles the firmware for the ESP32-C6 on every push, and — when you push a
# version tag like v1.0.0 — publishes a GitHub Release with a one-click flasher
# (bundled esptool + the .bin + a click-to-run script) for Windows, macOS and Linux.

on:
  push:
    branches: [ main ]
    paths-ignore: [ 'docs/firmware/**' ]   # the auto-published firmware commit must not re-trigger
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write        # needed to create the Release

env:
  FQBN: "esp32:esp32:esp32c6:PartitionScheme=custom,CDCOnBoot=cdc,FlashSize=16M"
  ESP32_CORE: "3.3.10"
  ESPTOOL_VER: "v4.8.1"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install arduino-cli
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 core + libraries
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install "esp32:esp32@${ESP32_CORE}"
          arduino-cli lib install "lvgl@8.3.11"
          arduino-cli lib install "GFX Library for Arduino@1.6.6"
          arduino-cli lib install "SensorLib@0.4.1"
          arduino-cli lib install "ArduinoJson@7.4.3"
          arduino-cli lib install "WiFiManager@2.0.17"
          LIBDIR="$(arduino-cli config get directories.user)/libraries"
          cp firmware/lv_conf.h "$LIBDIR/lv_conf.h"

      - name: Compile firmware
        run: |
          arduino-cli compile --fqbn "$FQBN" --output-dir build firmware/ReminderESP32
          ls -la build

      - name: Merge full-flash image
        run: |
          python3 -m pip install --quiet "esptool==4.8.1"
          python3 -m esptool --chip esp32c6 merge_bin \
            --flash_mode dio --flash_freq 80m --flash_size 16MB \
            -o build/firmware-merged.bin \
            0x0     build/ReminderESP32.ino.bootloader.bin \
            0x8000  build/ReminderESP32.ino.partitions.bin \
            0x10000 build/ReminderESP32.ino.bin
          ls -la build/firmware-merged.bin

      - name: Upload firmware (CI artifact)
        uses: actions/upload-artifact@v4
        with:
          name: firmware-merged
          path: build/firmware-merged.bin

      # ---- everything below only runs when you push a tag like v1.0.0 ----

      - name: Build per-OS one-click flashers
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -e
          mkdir -p dist
          base="https://github.com/espressif/esptool/releases/download/${ESPTOOL_VER}"

          pack () {  # $1=os label  $2=esptool zip name  $3=esptool bin name  $4=flash script
            echo "::group::pack $1"
            curl -fsSL -o "et-$1.zip" "$base/$2"
            mkdir -p "et-$1" && unzip -q "et-$1.zip" -d "et-$1"
            bin="$(find "et-$1" -type f -name "$3" | head -1)"
            out="pkg-$1"; mkdir -p "$out"
            cp "$bin" "$out/$3";  chmod +x "$out/$3" || true
            cp build/firmware-merged.bin "$out/"
            cp "tools/flasher/$4" "$out/"; chmod +x "$out/$4" || true
            cp tools/flasher/README.txt "$out/"
            ( cd "$out" && zip -qr "../dist/ReminderESP32-flasher-$1.zip" . )
            echo "::endgroup::"
          }

          pack windows "esptool-${ESPTOOL_VER}-win64.zip"        esptool.exe flash-windows.bat
          pack macos   "esptool-${ESPTOOL_VER}-macos.zip"        esptool     flash-mac.command
          pack linux   "esptool-${ESPTOOL_VER}-linux-amd64.zip"  esptool     flash-linux.sh
          ls -la dist

      - name: Build release notes (flasher help + this version's CHANGELOG)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VER="${GITHUB_REF_NAME#v}"
          {
            echo "### ⚡ Flash it — no tools to install"
            echo ""
            echo "Flash straight from your browser (no download) with the **[web flasher](https://hterminal.github.io/Alfred-the-reminder/)**, or use a one-click desktop flasher:"
            echo ""
            echo "| OS | Download | Run |"
            echo "|----|----------|-----|"
            echo "| Windows | \`ReminderESP32-flasher-windows.zip\` | double-click **flash-windows.bat** |"
            echo "| macOS   | \`ReminderESP32-flasher-macos.zip\`   | double-click **flash-mac.command** (right-click → Open the first time) |"
            echo "| Linux   | \`ReminderESP32-flasher-linux.zip\`   | run **./flash-linux.sh** |"
            echo ""
            echo "Plug the board in via USB-C first. After flashing, set up Wi-Fi from your phone (join the **\`Alfred-Setup\`** hotspot), then open the IP shown on the screen to configure reminders. \`firmware-merged.bin\` is the raw image if you'd rather flash it yourself."
            echo ""
            echo "---"
            echo ""
            # pull this version's section out of CHANGELOG.md
            awk -v ver="$VER" '
              index($0,"## ["ver"]")==1 {p=1; print; next}
              p && index($0,"## [")==1 {exit}
              p {print}
            ' CHANGELOG.md
          } > release_notes.md
          echo "----- release notes -----"; cat release_notes.md

      - name: Publish Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Alfred — the reminder ${{ github.ref_name }}"
          body_path: release_notes.md
          files: |
            dist/ReminderESP32-flasher-windows.zip
            dist/ReminderESP32-flasher-macos.zip
            dist/ReminderESP32-flasher-linux.zip
            build/firmware-merged.bin

      - name: Publish firmware to the web flasher (same-origin, no CORS)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF_NAME}"
          git fetch origin main
          git checkout -B main origin/main
          mkdir -p docs/firmware
          cp build/firmware-merged.bin "docs/firmware/${TAG}.bin"
          python3 - "$TAG" <<'PY'
          import json, os, sys
          tag = sys.argv[1]; p = "docs/firmware/versions.json"
          data = []
          if os.path.exists(p):
              try: data = json.load(open(p))
              except Exception: data = []
          data = [d for d in data if d.get("tag") != tag]
          data.insert(0, {"tag": tag, "file": f"{tag}.bin"})
          json.dump(data, open(p, "w"), indent=2)
          PY
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/firmware
          git commit -m "web flasher: publish firmware ${TAG} [skip ci]" || echo "nothing to commit"
          git push origin main
